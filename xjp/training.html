<!DOCTYPE html>
<html lang="zh-CN">
<title>Codeforces</title>

<link rel="stylesheet" href="buttons.css">
<script src="mt19937.js"></script>

<h1>Codeforces</h1>
<h2>Training mode</h2>

<a href="index.html">Return to home</a><br><br>

Division ((20,20),(15,15),(10,10)): <input type="number" min="0" max="3" step="1" id="get_div" placeholder="请输入 0-3 的整数">
<br>Seed: <input type="text" id="get_str" placeholder="请输入一个字符串">
<br>自定义题目：<br><textarea rows="10" cols="50" placeholder="请输入题目，每行两个字符串" id="settings">
农 衣
习 匀
习 刁
洗 冼
谌 湛
璧 壁
平 乎</textarea><br>
或上传文件：
<input type="file" id="settingsfile">
<button onclick="init()">START</button>

<script>

var n,m,pr,pc,pw,c1 = [],c2 = [],num = 0,streak = 0,bst = 0;

function WA() {
    streak = 0;

    let HTML = "<h1>Codeforces</h1><h2>Training mode</h2><a href=\"index.html\">Return to home</a><br><br>Current streak: " + streak.toString() + "; Best: " + bst.toString() + "<br><br><span style=\"color: red\">Wrong answer!</span> <button onclick=\"shuffle()\">Next problem</button><br><br>";
    for (let i = 1; i <= n; ++i)
    {
        for (let j = 1; j <= m; ++j)
            if (i == pr && j == pc) HTML += "<button class=\"xjpwa\">" + c2[pw] + "</button>";
            else HTML += "<button class=\"xjp\">" + c1[pw] + "</button>";
        HTML += "<br>";
    }

    document.body.innerHTML = HTML;
}
function AC() {
    streak += 1;
    if (streak > bst) bst = streak;

    let HTML = "<h1>Codeforces</h1><h2>Training mode</h2><a href=\"index.html\">Return to home</a><br><br>Current streak: " + streak.toString() + "; Best: " + bst.toString() + "<br><br><span style=\"color: green\">Accepted!</span> <button onclick=\"shuffle()\">Next problem</button><br><br>";
    for (let i = 1; i <= n; ++i)
    {
        for (let j = 1; j <= m; ++j)
            if (i == pr && j == pc) HTML += "<button class=\"xjpac\">" + c2[pw] + "</button>";
            else HTML += "<button class=\"xjp\">" + c1[pw] + "</button>";
        HTML += "<br>";
    }

    document.body.innerHTML = HTML;
}

function refresh() {
    let HTML = "<h1>Codeforces</h1><h2>Training mode</h2><a href=\"index.html\">Return to home</a><br><br>Current streak: " + streak.toString() + "; Best: " + bst.toString() + "<br><br>";
    for (let i = 1; i <= n; ++i)
    {
        for (let j = 1; j <= m; ++j)
            if (i == pr && j == pc) HTML += "<button onclick=\"AC()\" class=\"xjp\">" + c2[pw] + "</button>";
            else HTML += "<button onclick=\"WA()\" class=\"xjp\">" + c1[pw] + "</button>";
        HTML += "<br>";
    }

    document.body.innerHTML = HTML;
}

var settings = "",rng;
document.getElementById('settingsfile').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            settings = e.target.result;
        };
        reader.readAsText(file);
    }
});
function shuffle() {
    pr = rng.extract_number() % n + 1;
    pc = rng.extract_number() % m + 1;
    pw = rng.extract_number() % num + 1;

    refresh();
}
function init() {
    let div = document.getElementById('get_div').valueAsNumber, str = document.getElementById('get_str').value, seed = 0, mod = 998244353;
    for (let i = 0; i < str.length; i++) {
        seed = (seed * 131 + str.charCodeAt(i)) % mod;
    }
    
    rng = new MT19937(seed);

    let a = "", b = "", toB = 0;
    if (settings == "") settings = document.getElementById('settings').value;
    settings += "\n";
    for (let i = 0; i < settings.length; i++)
    {
        let c = settings.charAt(i);
        if (c == ' ' || c == '\n' || c == '\r') {
            if (a != "" && b != "") {
                ++num;
                c1[num] = a;
                c2[num] = b;
                ++num;
                c1[num] = b;
                c2[num] = a;
                a = b = "";
                toB = false;
            }
            else if (a != "") toB = true;
        }
        else if (toB) b += c;
        else a += c;
    }

    if (div == 0) n = m = 30;
    else if (div == 1) n = m = 20;
    else if (div == 2) n = m = 15;
    else n = m = 10;
    
    shuffle();
}

</script></html>
