<!DOCTYPE html>
<html lang="zh-CN">
<title>Codeforces</title>

<link rel="stylesheet" href="buttons.css">
<script src="mt19937.js"></script>

<h1>Codeforces</h1><h2>Contest mode</h2><a href="index.html">Return to home</a><br><br>

Division ((20,20,12),(15,15,10),(10,10,6)): <input type="number" min="0" max="3" step="1" id="get_div" placeholder="请输入 0-3 的整数">
<br>Seed: <input type="text" id="get_str" placeholder="请输入一个字符串">
<br>自定义题目：<br><textarea rows="10" cols="50" placeholder="请输入题目，每行两个字符串" id="settings">
农 衣
习 匀
习 刁
洗 冼
谌 湛
璧 壁
平 乎</textarea><br>
或上传文件：
<input type="file" id="settingsfile">
<button onclick="shuffle()">START</button>

<script>
var n,m,k,pl = 1,pr = [],pc = [],pw = [],ok = [],fail = [],c1 = [],c2 = [],ti,sum = 0,score = 100;
function finish() {
    for (let i = 1; i <= k; ++i) if (ok[i] != true) fail[i] = true;
    score = 30;
    let HTML = "<h1>Codeforces</h1><h2>Contest mode</h2><a href=\"index.html\">Return to home</a><br><br>Time's Up! <a href = \"contest.html\"><button>Restart</button></a><br>Final score: " + sum.toFixed(3).toString() + "<br><br>";
    for (let i = 1; i <= k; ++i) {
        if (i != pl)
            if (ok[i]) HTML += "<button class=\"ac\" onclick=";
            else if (fail[i]) HTML += "<button class=\"wa\" onclick=";
            else HTML += "<button class=\"norm\" onclick=";
        else
            if (ok[i]) HTML += "<button class=\"curac\" onclick=";
            else if (fail[i]) HTML += "<button class=\"curwa\" onclick=";
            else HTML += "<button class=\"cur\" onclick=";
        HTML += "\"pl=" + i.toString() + ",finish()\">" + String.fromCharCode(64 + i) + "</button>";
    }
    HTML += "<br><br>";
    for (let i = 1; i <= n; ++i)
    {
        for (let j = 1; j <= m; ++j)
            if (i == pr[pl] && j == pc[pl] && ok[pl]) HTML += "<button onclick=\"AC()\" class=\"xjpac\">" + c2[pw[pl]] + "</button>";
            else if (i == pr[pl] && j == pc[pl] && fail[pl]) HTML += "<button onclick=\"AC()\" class=\"xjpwa\">" + c2[pw[pl]] + "</button>";
            else if (i == pr[pl] && j == pc[pl]) HTML += "<button onclick=\"AC()\" class=\"xjp\">" + c2[pw[pl]] + "</button>";
            else HTML += "<button onclick=\"WA()\" class=\"xjp\">" + c1[pw[pl]] + "</button>";
        HTML += "<br>";
    }
    document.body.innerHTML = HTML;
}
function WA() {
    if (fail[pl] || ok[pl]) return;
    let ti2 = Date.now();
    score -= (ti2 - ti) * 0.0001;
    ti = ti2;
    if (score <= 30) finish();
    fail[pl] = true;
    refresh();
}
function AC() {
    if (fail[pl] || ok[pl]) return;
    let ti2 = Date.now();
    score -= (ti2 - ti) * 0.0001;
    if (score <= 30) finish();
    sum += score;
    ti = ti2;
    ok[pl] = true;
    refresh();
}
function resume() {
    ti = Date.now();
    refresh();
}
function pause() {
    let ti2 = Date.now();
    score -= (ti2 - ti) * 0.0001;
    if (score <= 30) finish();
    document.body.innerHTML = "<h1>Codeforces</h1><h2>Contest mode</h2><a href=\"index.html\">Return to home</a><br><br>Timer is paused. <button onclick=\"resume()\">Resume</button>";
}
function refresh() {
    let ti2 = Date.now();
    score -= (ti2 - ti) * 0.0001;
    if (score <= 30) finish();
    ti = ti2;
    let HTML = "<h1>Codeforces</h1><h2>Contest mode</h2><a href=\"index.html\">Return to home</a><br><br>Current score: " + sum.toFixed(3).toString() + "; Base pt " + score.toFixed(3).toString() + " <button onclick=\"refresh()\">Refresh</button> <button onclick=\"pause()\">Pause</button> <button onclick=\"finish()\">Quit</button><br><br>";
    for (let i = 1; i <= k; ++i) {
        if (i != pl)
            if (ok[i]) HTML += "<button class=\"ac\" onclick=";
            else if (fail[i]) HTML += "<button class=\"wa\" onclick=";
            else HTML += "<button class=\"norm\" onclick=";
        else
            if (ok[i]) HTML += "<button class=\"curac\" onclick=";
            else if (fail[i]) HTML += "<button class=\"curwa\" onclick=";
            else HTML += "<button class=\"cur\" onclick=";
        HTML += "\"pl=" + i.toString() + ",refresh()\">" + String.fromCharCode(64 + i) + "</button>";
    }
    HTML += "<br><br>";
    for (let i = 1; i <= n; ++i)
    {
        for (let j = 1; j <= m; ++j)
            if (i == pr[pl] && j == pc[pl] && ok[pl]) HTML += "<button onclick=\"AC()\" class=\"xjpac\">" + c2[pw[pl]] + "</button>";
            else if (i == pr[pl] && j == pc[pl] && fail[pl]) HTML += "<button onclick=\"AC()\" class=\"xjpwa\">" + c2[pw[pl]] + "</button>";
            else if (i == pr[pl] && j == pc[pl]) HTML += "<button onclick=\"AC()\" class=\"xjp\">" + c2[pw[pl]] + "</button>";
            else HTML += "<button onclick=\"WA()\" class=\"xjp\">" + c1[pw[pl]] + "</button>";
        HTML += "<br>";
    }

    document.body.innerHTML = HTML;
}
var settings = "";
document.getElementById('settingsfile').addEventListener('change', function(event) {
    const file = event.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            settings = e.target.result;
        };
        reader.readAsText(file);
    }
});
function shuffle() {
    let div = document.getElementById('get_div').valueAsNumber, str = document.getElementById('get_str').value, seed = 0, mod = 998244353;
    for (let i = 0; i < str.length; i++) {
        seed = (seed * 131 + str.charCodeAt(i)) % mod;
    }
    const rng = new MT19937(seed);

    let num = 0, a = "", b = "", toB = 0;
    if (settings == "") settings = document.getElementById('settings').value;
    settings += "\n";
    for (let i = 0; i < settings.length; i++)
    {
        let c = settings.charAt(i);
        if (c == ' ' || c == '\n' || c == '\r') {
            if (a != "" && b != "") {
                ++num;
                c1[num] = a;
                c2[num] = b;
                ++num;
                c1[num] = b;
                c2[num] = a;
                a = b = "";
                toB = false;
            }
            else if (a != "") toB = true;
        }
        else if (toB) b += c;
        else a += c;
    }

    console.log(c1);

    if (div == 0) n = m = 30,k = 15;
    else if (div == 1) n = m = 20,k = 12;
    else if (div == 2) n = m = 15,k = 10;
    else n = m = 10,k = 6;

    for (let i = 1; i <= k; ++i)
    {
        pr[i] = rng.extract_number() % n + 1;
        pc[i] = rng.extract_number() % m + 1;
        pw[i] = rng.extract_number() % num + 1;
    }

    ti = Date.now();

    refresh();
}
</script>

</html>
